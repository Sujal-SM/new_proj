version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linksort-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/backend.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - linksort-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: linksort-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - linksort-net

networks:
  linksort-net:
    driver: bridge
