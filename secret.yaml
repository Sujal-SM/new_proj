# ─────────────────────────────────────────────────────────────────
# DO NOT commit real values — fill these via CI/CD or OCI Vault
# All values must be base64 encoded:  echo -n "value" | base64
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: linksort
type: Opaque
data:
  # Replace each value with: echo -n "your-actual-value" | base64
  PORT: MzAwMA==                    # 3000
  NODE_ENV: cHJvZHVjdGlvbg==       # production
  MONGO_URI: <base64-encoded-mongo-uri>
  JWT_SECRET: <base64-encoded-jwt-secret>
  JWT_EXPIRES_IN: <base64-encoded-expiry>
  CLOUDINARY_CLOUD_NAME: <base64-encoded-value>
  CLOUDINARY_API_KEY: <base64-encoded-value>
  CLOUDINARY_API_SECRET: <base64-encoded-value>
  CORS_ORIGIN: <base64-encoded-frontend-url>
